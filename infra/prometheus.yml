global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: streamrec

scrape_configs:
  - job_name: event-producer
    static_configs:
      - targets: ["event-producer:8001"]
    metrics_path: /metrics

  - job_name: inference-service
    static_configs:
      - targets: ["inference-service:8002"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
